<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Schedule - SXSW 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #333;
  --text: #e8e8e8;
  --text-dim: #888;
  --accent: #28a745;
  --accent2: #e55714;
  --platinum: #8b7355;
  --interactive: #e55714;
  --filmtv: #006ba8;
  --music: #28a745;
  --free: #9b59b6;
  --wristband: #d4a017;
  --sched: #f0c040;
  --walk: #5ba8f7;
  --parking: #17a2b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--surface);
  border-bottom: 2px solid var(--sched);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.logo {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 2px;
}

.logo span { color: var(--accent); }

.nav-links {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-link {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  transition: all 0.15s;
}

.nav-link:hover { color: var(--text); border-color: var(--text-dim); }
.nav-link.active { color: var(--sched); border-color: var(--sched); }

.sched-count {
  background: var(--sched);
  color: #000;
  font-size: 11px;
  font-weight: 800;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 4px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: opacity 0.2s;
}

.btn:hover { opacity: 0.85; }
.btn--danger { background: #c0392b; }
.btn--secondary { background: var(--surface2); border: 1px solid var(--border); }
.btn--parking { background: var(--parking); }

/* Day tabs */
.day-tabs {
  background: var(--surface);
  padding: 12px 24px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}

.day-tab {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.15s;
  position: relative;
}

.day-tab:hover { border-color: var(--sched); color: var(--text); }
.day-tab.active {
  background: var(--sched);
  color: #000;
  border-color: var(--sched);
}

.day-tab .tab-count {
  font-size: 11px;
  opacity: 0.7;
  margin-left: 4px;
}

/* Main layout */
.main-content {
  display: flex;
  height: calc(100vh - 120px);
}

.schedule-panel {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  min-width: 0;
}

.map-panel {
  width: 40%;
  min-width: 350px;
  position: relative;
  display: flex;
  flex-direction: column;
}

#map { width: 100%; flex: 1; }

/* Parking panel */
.parking-panel {
  background: var(--surface);
  border-top: 2px solid var(--parking);
  max-height: 45%;
  overflow-y: auto;
  display: none;
}

.parking-panel.open { display: block; }

.parking-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 5;
}

.parking-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--parking);
  letter-spacing: 0.5px;
}

.parking-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.parking-select {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  max-width: 180px;
  cursor: pointer;
}

.parking-select:focus { border-color: var(--parking); outline: none; }

.parking-sort {
  display: flex;
  gap: 2px;
}

.sort-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.sort-btn:first-child { border-radius: 4px 0 0 4px; }
.sort-btn:last-child { border-radius: 0 4px 4px 0; }
.sort-btn.active { background: var(--parking); color: #fff; border-color: var(--parking); }
.sort-btn:hover:not(.active) { border-color: var(--parking); color: var(--text); }

.close-parking {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
}

.close-parking:hover { color: var(--text); }

.parking-item {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.15s;
  cursor: pointer;
}

.parking-item:hover { background: var(--surface2); }

.parking-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(23, 162, 184, 0.15);
  color: var(--parking);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 800;
  flex-shrink: 0;
}

.parking-details { flex: 1; min-width: 0; }

.parking-name {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 2px;
}

.parking-addr {
  font-size: 11px;
  color: var(--text-dim);
}

.parking-notes {
  font-size: 10px;
  color: var(--text-dim);
  font-style: italic;
  margin-top: 2px;
}

.parking-stats {
  text-align: right;
  flex-shrink: 0;
}

.parking-price {
  font-size: 16px;
  font-weight: 800;
  color: var(--accent);
}

.parking-price-label {
  font-size: 10px;
  color: var(--text-dim);
}

.parking-distance {
  font-size: 12px;
  color: var(--walk);
  font-weight: 600;
  margin-top: 2px;
}

.parking-walk-time {
  font-size: 10px;
  color: var(--text-dim);
}

.parking-spaces {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 1px;
}

.parking-toggle {
  position: absolute;
  bottom: 0;
  right: 12px;
  z-index: 1000;
  background: var(--parking);
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 6px 6px 0 0;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.3);
  transition: all 0.15s;
}

.parking-toggle:hover { opacity: 0.9; }
.parking-toggle.open { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); border-bottom: none; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text-dim);
}

.empty-state h2 {
  font-size: 22px;
  color: var(--text);
  margin-bottom: 12px;
}

.empty-state p { margin-bottom: 20px; font-size: 15px; }

.empty-state a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
}

/* Event card */
.sched-event {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: background 0.15s;
  cursor: pointer;
}

.sched-event:hover { background: var(--surface); }

.event-time-col {
  width: 80px;
  flex-shrink: 0;
  text-align: right;
  padding-top: 2px;
}

.event-time-start {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
}

.event-time-end {
  font-size: 12px;
  color: var(--text-dim);
}

.event-thumb {
  width: 52px;
  height: 52px;
  border-radius: 8px;
  object-fit: cover;
  background: var(--surface2);
  flex-shrink: 0;
}

.event-info { flex: 1; min-width: 0; }

.event-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}

.event-venue {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}

.event-address {
  font-size: 12px;
  color: var(--text-dim);
}

.event-badges {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  align-items: center;
}

.badge-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge-pill.Platinum { background: var(--platinum); }
.badge-pill.Interactive { background: var(--interactive); }
.badge-pill.Film { background: var(--filmtv); }
.badge-pill.Music { background: var(--music); }
.badge-pill.Free { background: var(--free); }

.badge-genre {
  font-size: 11px;
  color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
}

.remove-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 30px;
  height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}

.remove-btn:hover {
  border-color: #c0392b;
  color: #c0392b;
  background: rgba(192, 57, 43, 0.1);
}

/* Walking distance divider */
.walk-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 24px 0 104px;
  color: var(--walk);
  font-size: 13px;
  font-weight: 600;
}

.walk-line {
  flex: 0 0 2px;
  width: 2px;
  height: 32px;
  background: var(--walk);
  opacity: 0.4;
  margin-left: 38px;
  border-radius: 1px;
}

.walk-info {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 12px;
}

.walk-icon { font-size: 16px; }

.walk-warning {
  color: var(--accent2);
}

.walk-ok {
  color: var(--walk);
}

.walk-same {
  color: var(--accent);
}

/* Time conflict */
.time-conflict {
  background: rgba(192, 57, 43, 0.08);
  border-left: 3px solid #c0392b;
}

.conflict-badge {
  font-size: 10px;
  background: #c0392b;
  color: #fff;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 700;
}

/* Day header */
.day-header {
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 700;
  color: var(--sched);
  letter-spacing: 1px;
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.day-event-count {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 500;
}

/* Leaflet */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-radius: 8px !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
}

.leaflet-popup-tip { background: var(--surface) !important; }

.leaflet-popup-content {
  margin: 12px !important;
  font-size: 13px !important;
  line-height: 1.5 !important;
}

/* Scrollbar */
.schedule-panel::-webkit-scrollbar, .parking-panel::-webkit-scrollbar { width: 6px; }
.schedule-panel::-webkit-scrollbar-track, .parking-panel::-webkit-scrollbar-track { background: var(--bg); }
.schedule-panel::-webkit-scrollbar-thumb, .parking-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Responsive */
@media (max-width: 900px) {
  .main-content { flex-direction: column; height: auto; }
  .map-panel { width: 100%; min-width: 0; height: 350px; }
  .schedule-panel { max-height: 60vh; }
  .walk-divider { padding-left: 24px; }
  .walk-line { margin-left: 8px; }
  .parking-panel { max-height: 300px; }
}
</style>
</head>
<body>
<header>
  <div class="logo">SXSW <span>2026</span> MUSIC</div>
  <div class="nav-links">
    <a href="/" class="nav-link">Browse</a>
    <a href="/schedule" class="nav-link active">My Schedule<span class="sched-count" id="schedCount">0</span></a>
  </div>
  <div class="header-actions">
    <button class="btn btn--danger" id="clearBtn" onclick="clearSchedule()" style="display:none">Clear All</button>
  </div>
</header>

<div class="day-tabs" id="dayTabs"></div>

<div class="main-content">
  <div class="schedule-panel" id="schedulePanel">
    <div id="scheduleList"></div>
  </div>
  <div class="map-panel">
    <div id="map"></div>
    <button class="parking-toggle" id="parkingToggle" onclick="toggleParking()">Parking</button>
    <div class="parking-panel" id="parkingPanel">
      <div class="parking-header">
        <span class="parking-title">NEARBY PARKING</span>
        <div class="parking-controls">
          <select class="parking-select" id="venueSelect" onchange="loadParking()">
            <option value="">Select a venue...</option>
          </select>
          <div class="parking-sort">
            <button class="sort-btn active" id="sortDist" onclick="sortParking('distance')">Distance</button>
            <button class="sort-btn" id="sortPrice" onclick="sortParking('price')">Price</button>
          </div>
          <button class="close-parking" onclick="toggleParking()">&times;</button>
        </div>
      </div>
      <div id="parkingList"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let scheduleEvents = [];
let activeDay = null;
let map, markerGroup, pathGroup, parkingMarkerGroup;
let parkingData = [];
let parkingSort = 'distance';
let parkingOpen = false;

const DAY_LABELS = {
  '2026-03-12': 'THU Mar 12',
  '2026-03-13': 'FRI Mar 13',
  '2026-03-14': 'SAT Mar 14',
  '2026-03-15': 'SUN Mar 15',
  '2026-03-16': 'MON Mar 16',
  '2026-03-17': 'TUE Mar 17',
  '2026-03-18': 'WED Mar 18',
};

function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: false })
    .setView([30.267, -97.743], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);
  markerGroup = L.layerGroup().addTo(map);
  pathGroup = L.layerGroup().addTo(map);
  parkingMarkerGroup = L.layerGroup().addTo(map);
}

function getSchedule() {
  try { return JSON.parse(localStorage.getItem('sxsw_schedule') || '[]'); }
  catch { return []; }
}

function saveSchedule(ids) {
  localStorage.setItem('sxsw_schedule', JSON.stringify(ids));
  updateSchedCount();
}

function updateSchedCount() {
  const ids = getSchedule();
  document.getElementById('schedCount').textContent = ids.length;
  document.getElementById('clearBtn').style.display = ids.length ? '' : 'none';
}

async function loadSchedule() {
  const ids = getSchedule();
  if (!ids.length) {
    showEmpty();
    return;
  }

  const resp = await fetch('/api/schedule-events', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ids }),
  });
  const data = await resp.json();
  scheduleEvents = data.events;
  buildDayTabs();
  renderSchedule();
  renderMap();
  populateVenueSelect();
}

function showEmpty() {
  document.getElementById('dayTabs').innerHTML = '';
  document.getElementById('scheduleList').innerHTML = `
    <div class="empty-state">
      <h2>Your schedule is empty</h2>
      <p>Browse events and tap the + button to add shows to your personal schedule.</p>
      <a href="/">Browse Events</a>
    </div>`;
  markerGroup.clearLayers();
  pathGroup.clearLayers();
}

function populateVenueSelect() {
  const sel = document.getElementById('venueSelect');
  // Deduplicate venues from scheduled events
  const venueMap = {};
  scheduleEvents.forEach(e => {
    if (e.venue && e.venue_lat && e.venue_lng) {
      venueMap[e.venue] = { lat: e.venue_lat, lng: e.venue_lng, id: e.venue_id };
    }
  });
  const venues = Object.entries(venueMap).sort((a, b) => a[0].localeCompare(b[0]));
  sel.innerHTML = '<option value="">Select a venue...</option>' +
    venues.map(([name, v]) =>
      `<option value="${v.lat},${v.lng}" data-venue-id="${v.id}">${name}</option>`
    ).join('');
}

function toggleParking() {
  parkingOpen = !parkingOpen;
  document.getElementById('parkingPanel').classList.toggle('open', parkingOpen);
  document.getElementById('parkingToggle').classList.toggle('open', parkingOpen);
  document.getElementById('parkingToggle').textContent = parkingOpen ? 'Hide Parking' : 'Parking';
  if (parkingOpen && !parkingData.length) {
    // Auto-select first venue if available
    const sel = document.getElementById('venueSelect');
    if (sel.options.length > 1 && !sel.value) {
      sel.selectedIndex = 1;
      loadParking();
    } else if (sel.value) {
      loadParking();
    } else {
      // Load all parking without distance
      loadParking();
    }
  }
  if (!parkingOpen) {
    parkingMarkerGroup.clearLayers();
  }
  setTimeout(() => map.invalidateSize(), 100);
}

async function loadParking() {
  const sel = document.getElementById('venueSelect');
  const val = sel.value;
  let url = '/api/parking';
  if (val) {
    const [lat, lng] = val.split(',');
    url += `?lat=${lat}&lng=${lng}`;
  }
  const resp = await fetch(url);
  const data = await resp.json();
  parkingData = data.parking;
  sortParking(parkingSort);
}

function sortParking(by) {
  parkingSort = by;
  document.getElementById('sortDist').classList.toggle('active', by === 'distance');
  document.getElementById('sortPrice').classList.toggle('active', by === 'price');

  if (by === 'distance') {
    parkingData.sort((a, b) => (a.distance ?? 999) - (b.distance ?? 999));
  } else {
    parkingData.sort((a, b) => a.rate_day - b.rate_day);
  }
  renderParking();
}

function renderParking() {
  const list = document.getElementById('parkingList');
  if (!parkingData.length) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-dim);">No parking data available.</div>';
    return;
  }

  list.innerHTML = parkingData.map((p, i) => {
    const distHtml = p.distance != null
      ? `<div class="parking-distance">${p.distance} mi</div>
         <div class="parking-walk-time">~${Math.max(Math.round(p.distance * 20), 1)} min walk</div>`
      : '<div class="parking-distance" style="color:var(--text-dim);">--</div>';

    const icon = p.type === 'garage' ? 'G' : 'L';

    return `<div class="parking-item" onclick="panToParking(${p.lat}, ${p.lng}, '${esc(p.name)}')">
      <div class="parking-icon">${icon}</div>
      <div class="parking-details">
        <div class="parking-name">${esc(p.name)}</div>
        <div class="parking-addr">${esc(p.address)}</div>
        ${p.notes ? `<div class="parking-notes">${esc(p.notes)}</div>` : ''}
      </div>
      <div class="parking-stats">
        <div class="parking-price">$${p.rate_day}</div>
        <div class="parking-price-label">/ day</div>
        ${distHtml}
        <div class="parking-spaces">${p.spaces} spots</div>
      </div>
    </div>`;
  }).join('');

  renderParkingMarkers();
}

function renderParkingMarkers() {
  parkingMarkerGroup.clearLayers();
  if (!parkingOpen) return;

  parkingData.forEach(p => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background: #17a2b8;
        color: #fff;
        width: 22px; height: 22px;
        border-radius: 4px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 11px;
        border: 2px solid #fff;
        box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      ">P</div>`,
      iconSize: [22, 22],
      iconAnchor: [11, 11],
    });

    const marker = L.marker([p.lat, p.lng], { icon });
    marker.bindPopup(`
      <div style="font-weight:700;font-size:14px;margin-bottom:4px;color:#17a2b8;">P ${esc(p.name)}</div>
      <div style="color:#888;">${esc(p.address)}</div>
      <div style="color:#28a745;font-weight:700;font-size:16px;">$${p.rate_day}/day</div>
      <div style="color:#888;font-size:12px;">2hr: $${p.rate_2h} | ${p.spaces} spaces | ${p.type}</div>
      ${p.notes ? `<div style="color:#888;font-size:11px;font-style:italic;margin-top:4px;">${esc(p.notes)}</div>` : ''}
      ${p.distance != null ? `<div style="color:#5ba8f7;font-weight:600;margin-top:4px;">${p.distance} mi (~${Math.max(Math.round(p.distance * 20), 1)} min walk)</div>` : ''}
    `, { maxWidth: 280 });
    parkingMarkerGroup.addLayer(marker);
  });
}

function panToParking(lat, lng, name) {
  if (lat && lng && map) {
    map.setView([lat, lng], 17);
    parkingMarkerGroup.eachLayer(layer => {
      if (layer.getLatLng &&
          Math.abs(layer.getLatLng().lat - lat) < 0.0001 &&
          Math.abs(layer.getLatLng().lng - lng) < 0.0001) {
        layer.openPopup();
      }
    });
  }
}

function buildDayTabs() {
  const counts = {};
  scheduleEvents.forEach(e => {
    const d = e.date;
    counts[d] = (counts[d] || 0) + 1;
  });

  const days = Object.keys(counts).sort();
  if (!days.length) { showEmpty(); return; }

  if (!activeDay || !counts[activeDay]) activeDay = days[0];

  document.getElementById('dayTabs').innerHTML =
    `<button class="day-tab ${!activeDay ? 'active' : ''}" onclick="setDay(null)">ALL<span class="tab-count">(${scheduleEvents.length})</span></button>` +
    days.map(d =>
      `<button class="day-tab ${activeDay === d ? 'active' : ''}" onclick="setDay('${d}')">${DAY_LABELS[d] || d}<span class="tab-count">(${counts[d]})</span></button>`
    ).join('');
}

function setDay(d) {
  activeDay = d;
  buildDayTabs();
  renderSchedule();
  renderMap();
}

function renderSchedule() {
  const events = activeDay
    ? scheduleEvents.filter(e => e.date === activeDay)
    : scheduleEvents;

  if (!events.length) {
    document.getElementById('scheduleList').innerHTML =
      '<div class="empty-state"><h2>No events this day</h2><p>Select a different day or <a href="/">browse events</a> to add more.</p></div>';
    return;
  }

  // Group by date
  const grouped = {};
  events.forEach(e => {
    if (!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e);
  });

  let html = '';
  Object.keys(grouped).sort().forEach(date => {
    const dayEvents = grouped[date];
    html += `<div class="day-header">${DAY_LABELS[date] || date}<span class="day-event-count">${dayEvents.length} show${dayEvents.length !== 1 ? 's' : ''}</span></div>`;

    dayEvents.forEach((e, i) => {
      // Walking distance divider
      if (i > 0 && e.walk) {
        const w = e.walk;
        let cls = 'walk-ok';
        let icon = '&#128694;'; // walking person
        let label = `${w.miles} mi &middot; ~${w.minutes} min walk`;

        if (w.miles < 0.01) {
          cls = 'walk-same';
          label = 'Same venue';
          icon = '&#128205;'; // pin
        } else if (w.minutes > 15) {
          cls = 'walk-warning';
          label = `${w.miles} mi &middot; ~${w.minutes} min walk`;
        }

        // Check time overlap
        const prev = dayEvents[i - 1];
        let conflictHtml = '';
        if (prev.end_iso && e.start_iso && prev.end_iso > e.start_iso) {
          conflictHtml = '<span class="conflict-badge">OVERLAP</span>';
        }

        html += `<div class="walk-divider">
          <div class="walk-line"></div>
          <div class="walk-info ${cls}">
            <span class="walk-icon">${icon}</span>
            <span>${label}</span>
            ${conflictHtml}
          </div>
        </div>`;
      } else if (i > 0 && !e.walk) {
        const prev = dayEvents[i - 1];
        if (prev.venue_lat && prev.venue_lng && e.venue_lat && e.venue_lng) {
          const dist = haversine(prev.venue_lat, prev.venue_lng, e.venue_lat, e.venue_lng);
          const mins = Math.max(Math.round(dist * 20), 1);
          let cls = 'walk-ok';
          let icon = '&#128694;';
          let label = `${dist.toFixed(2)} mi &middot; ~${mins} min walk`;
          if (dist < 0.01) { cls = 'walk-same'; label = 'Same venue'; icon = '&#128205;'; }
          else if (mins > 15) { cls = 'walk-warning'; }

          let conflictHtml = '';
          if (prev.end_iso && e.start_iso && prev.end_iso > e.start_iso) {
            conflictHtml = '<span class="conflict-badge">OVERLAP</span>';
          }

          html += `<div class="walk-divider">
            <div class="walk-line"></div>
            <div class="walk-info ${cls}">
              <span class="walk-icon">${icon}</span>
              <span>${label}</span>
              ${conflictHtml}
            </div>
          </div>`;
        }
      }

      const badgeLabels = { 'Platinum': 'P', 'Interactive': 'I', 'Film & TV': 'F', 'Music': 'M', 'Free': 'Free' };
      const badgeCls = a => a === 'Film & TV' ? 'Film' : a;
      const badges = (e.access_levels || []).map(a =>
        `<span class="badge-pill ${badgeCls(a)}" title="${a === 'Free' ? 'Free / Open' : a + ' Badge'}">${badgeLabels[a] || a[0]}</span>`
      ).join('');

      const thumbHtml = e.thumbnail_url
        ? `<img class="event-thumb" src="${e.thumbnail_url}" alt="" loading="lazy" onerror="this.style.display='none'" />`
        : '';

      // Check for time conflict with previous
      let conflictClass = '';
      if (i > 0) {
        const prev = dayEvents[i - 1];
        if (prev.end_iso && e.start_iso && prev.end_iso > e.start_iso) {
          conflictClass = ' time-conflict';
        }
      }

      html += `<div class="sched-event${conflictClass}" data-id="${e.id}" onclick="panTo(${e.venue_lat}, ${e.venue_lng})">
        <div class="event-time-col">
          <div class="event-time-start">${e.start_time || 'TBA'}</div>
          <div class="event-time-end">${e.end_time ? 'to ' + e.end_time : ''}</div>
        </div>
        ${thumbHtml}
        <div class="event-info">
          <div class="event-name">${esc(e.name)}</div>
          <div class="event-venue">${esc(e.venue)}</div>
          <div class="event-address">${esc(e.venue_address)}</div>
          <div class="event-badges">
            ${badges}
            ${e.genre ? `<span class="badge-genre">${e.genre}</span>` : ''}
          </div>
        </div>
        <button class="remove-btn" onclick="event.stopPropagation(); removeFromSchedule('${e.id}')" title="Remove from schedule">&times;</button>
      </div>`;
    });
  });

  document.getElementById('scheduleList').innerHTML = html;
}

function renderMap() {
  markerGroup.clearLayers();
  pathGroup.clearLayers();

  const events = activeDay
    ? scheduleEvents.filter(e => e.date === activeDay)
    : scheduleEvents;

  const bounds = [];
  const pathCoords = [];

  events.forEach((e, i) => {
    if (!e.venue_lat || !e.venue_lng) return;

    bounds.push([e.venue_lat, e.venue_lng]);
    pathCoords.push([e.venue_lat, e.venue_lng]);

    const numIcon = L.divIcon({
      className: '',
      html: `<div style="
        background: var(--sched, #f0c040);
        color: #000;
        width: 24px; height: 24px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 12px;
        border: 2px solid #fff;
        box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      ">${i + 1}</div>`,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });

    const numberedMarker = L.marker([e.venue_lat, e.venue_lng], { icon: numIcon });
    numberedMarker.bindPopup(`
      <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${i + 1}. ${esc(e.name)}</div>
      <div style="color:#888;">${esc(e.venue)}</div>
      <div style="color:#28a745;font-weight:600;">${e.start_time || 'TBA'}${e.end_time ? ' - ' + e.end_time : ''}</div>
      <div style="color:#888;font-size:12px;">${esc(e.venue_address)}</div>
    `, { maxWidth: 280 });

    markerGroup.addLayer(numberedMarker);
  });

  // Draw walking path
  if (pathCoords.length > 1) {
    const polyline = L.polyline(pathCoords, {
      color: '#5ba8f7',
      weight: 3,
      opacity: 0.6,
      dashArray: '8, 8',
    });
    pathGroup.addLayer(polyline);
  }

  if (bounds.length) {
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
  }
}

function removeFromSchedule(id) {
  let ids = getSchedule().filter(i => i !== id);
  saveSchedule(ids);
  scheduleEvents = scheduleEvents.filter(e => e.id !== id);
  recalcWalks();
  if (!scheduleEvents.length) {
    showEmpty();
    return;
  }
  buildDayTabs();
  renderSchedule();
  renderMap();
  populateVenueSelect();
}

function recalcWalks() {
  const grouped = {};
  scheduleEvents.forEach(e => {
    if (!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e);
  });
  Object.values(grouped).forEach(dayEvents => {
    dayEvents.forEach((e, i) => {
      e.walk = null;
      if (i > 0) {
        const prev = dayEvents[i - 1];
        if (prev.venue_lat && prev.venue_lng && e.venue_lat && e.venue_lng) {
          const dist = haversine(prev.venue_lat, prev.venue_lng, e.venue_lat, e.venue_lng);
          e.walk = {
            miles: parseFloat(dist.toFixed(2)),
            minutes: Math.max(Math.round(dist * 20), 1),
            from_venue: prev.venue,
          };
        }
      }
    });
  });
}

function clearSchedule() {
  if (!confirm('Remove all events from your schedule?')) return;
  saveSchedule([]);
  scheduleEvents = [];
  showEmpty();
}

function panTo(lat, lng) {
  if (lat && lng && map) {
    map.setView([lat, lng], 17);
    markerGroup.eachLayer(layer => {
      if (layer.getLatLng &&
          Math.abs(layer.getLatLng().lat - lat) < 0.0001 &&
          Math.abs(layer.getLatLng().lng - lng) < 0.0001) {
        layer.openPopup();
      }
    });
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * 3956 * Math.asin(Math.sqrt(a));
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Init
initMap();
updateSchedCount();
loadSchedule();
</script>
