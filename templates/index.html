<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SXSW 2026 Music Showcases</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #333;
  --text: #e8e8e8;
  --text-dim: #888;
  --accent: #28a745;
  --accent2: #e55714;
  --platinum: #8b7355;
  --interactive: #e55714;
  --filmtv: #006ba8;
  --music: #28a745;
  --free: #9b59b6;
  --wristband: #d4a017;
  --sched: #f0c040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.logo {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 2px;
}

.logo span { color: var(--accent); }

.header-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 13px;
  color: var(--text-dim);
}

.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: opacity 0.2s;
}

.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn--secondary { background: var(--surface2); border: 1px solid var(--border); }

.controls {
  background: var(--surface);
  padding: 16px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-end;
  border-bottom: 1px solid var(--border);
}

.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-group label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 600;
}

input[type="text"], select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  outline: none;
}

input[type="text"]:focus, select:focus {
  border-color: var(--accent);
}

.day-buttons {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.day-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.15s;
}

.day-btn:hover { border-color: var(--accent); color: var(--text); }
.day-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.badge-filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.badge-check {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  padding: 4px 10px 4px 6px;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all 0.15s;
  opacity: 0.5;
}

.badge-check:hover { opacity: 0.75; }
.badge-check.checked { opacity: 1; border-color: var(--border); background: var(--surface2); }

.badge-check input { display: none; }
.badge-dot {
  width: 22px;
  height: 22px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
}

.badge-label {
  font-size: 12px;
  color: var(--text);
  white-space: nowrap;
}

.badge-dot.platinum { background: var(--platinum); }
.badge-dot.interactive { background: var(--interactive); }
.badge-dot.filmtv { background: var(--filmtv); }
.badge-dot.music { background: var(--music); }
.badge-dot.free { background: var(--free); }
.badge-dot.wristband { background: var(--wristband); }

.main-content {
  display: flex;
  height: calc(100vh - 160px);
}

.event-list-panel {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  min-width: 0;
}

.map-panel {
  width: 45%;
  min-width: 400px;
  position: relative;
}

#map { width: 100%; height: 100%; }

.results-header {
  padding: 12px 24px;
  font-size: 13px;
  color: var(--text-dim);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.view-toggle {
  display: flex;
  gap: 4px;
}

.view-toggle button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}

.view-toggle button.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.event-card {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.event-card:hover { background: var(--surface); }

.event-thumb {
  width: 56px;
  height: 56px;
  border-radius: 8px;
  object-fit: cover;
  background: var(--surface2);
  flex-shrink: 0;
}

.event-info { flex: 1; min-width: 0; }

.event-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.event-meta {
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 12px;
}

.event-meta .venue { color: var(--text); font-weight: 500; }
.event-meta .time { color: var(--accent); font-weight: 600; }

.event-badges {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  align-items: center;
}

.badge-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge-pill.Platinum { background: var(--platinum); }
.badge-pill.Interactive { background: var(--interactive); }
.badge-pill.Film { background: var(--filmtv); }
.badge-pill.Music { background: var(--music); }
.badge-pill.Free { background: var(--free); }
.badge-pill.Wristband { background: var(--wristband); }

.badge-genre {
  font-size: 11px;
  color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
}

.event-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
  margin-left: auto;
}

.distance-badge {
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
  white-space: nowrap;
}

.sched-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.sched-btn:hover { border-color: var(--sched); color: var(--sched); }
.sched-btn.added {
  background: var(--sched);
  border-color: var(--sched);
  color: #000;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-link {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  transition: all 0.15s;
}

.nav-link:hover { color: var(--text); border-color: var(--text-dim); }
.nav-link.active { color: var(--sched); border-color: var(--sched); }

.sched-count {
  background: var(--sched);
  color: #000;
  font-size: 11px;
  font-weight: 800;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 4px;
}

.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-dim);
  font-size: 16px;
}

.no-results {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-dim);
}

.no-results h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

/* Leaflet popup styling */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-radius: 8px !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
}

.leaflet-popup-tip { background: var(--surface) !important; }

.leaflet-popup-content {
  margin: 12px !important;
  font-size: 13px !important;
  line-height: 1.5 !important;
}

.popup-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.popup-venue { color: var(--text-dim); }
.popup-time { color: var(--accent); font-weight: 600; }

/* Search */
.search-box {
  position: relative;
  flex: 1;
  max-width: 260px;
}

.search-box input { width: 100%; }

/* Genre dropdown */
.genre-select { min-width: 140px; }

/* Responsive */
@media (max-width: 900px) {
  .main-content { flex-direction: column; height: auto; }
  .map-panel { width: 100%; min-width: 0; height: 400px; }
  .event-list-panel { height: auto; max-height: 60vh; }
  .controls { gap: 8px; }
}

/* Scrollbar */
.event-list-panel::-webkit-scrollbar { width: 6px; }
.event-list-panel::-webkit-scrollbar-track { background: var(--bg); }
.event-list-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Scrape status */
.scrape-status {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--surface2);
}

.scrape-status.active {
  color: var(--accent);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
</style>
</head>
<body>
<header>
  <div class="logo">SXSW <span>2026</span> MUSIC</div>
  <div class="nav-links">
    <a href="/" class="nav-link active">Browse</a>
    <a href="/schedule" class="nav-link" id="schedNav">My Schedule<span class="sched-count" id="schedCount" style="display:none">0</span></a>
  </div>
  <div class="header-meta">
    <span id="lastScraped">Last updated: {{ last_scraped[:16] if last_scraped else 'Never' }}</span>
    <button class="btn btn--secondary" id="rescrapeBtn" onclick="rescrape()">Re-scrape</button>
    <span class="scrape-status" id="scrapeStatus"></span>
  </div>
</header>

<div class="controls">
  <div class="control-group search-box">
    <label>Search</label>
    <input type="text" id="searchInput" placeholder="Artist, venue, genre..." />
  </div>

  <div class="control-group">
    <label>Day</label>
    <div class="day-buttons" id="dayButtons">
      <button class="day-btn active" data-day="">ALL</button>
      <button class="day-btn" data-day="2026-03-12">THU 12</button>
      <button class="day-btn" data-day="2026-03-13">FRI 13</button>
      <button class="day-btn" data-day="2026-03-14">SAT 14</button>
      <button class="day-btn" data-day="2026-03-15">SUN 15</button>
      <button class="day-btn" data-day="2026-03-16">MON 16</button>
      <button class="day-btn" data-day="2026-03-17">TUE 17</button>
      <button class="day-btn" data-day="2026-03-18">WED 18</button>
    </div>
  </div>

  <div class="control-group">
    <label>Genre</label>
    <select id="genreSelect" class="genre-select">
      <option value="">All Genres</option>
      {% for g in genres %}
      <option value="{{ g }}">{{ g }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="control-group">
    <label>Badge / Wristband Access</label>
    <div class="badge-filters">
      <label class="badge-check"><input type="checkbox" value="Platinum" /><span class="badge-dot platinum">P</span><span class="badge-label">Platinum Badge</span></label>
      <label class="badge-check"><input type="checkbox" value="Interactive" /><span class="badge-dot interactive">I</span><span class="badge-label">Interactive Badge</span></label>
      <label class="badge-check"><input type="checkbox" value="Film &amp; TV" /><span class="badge-dot filmtv">F</span><span class="badge-label">Film &amp; TV Badge</span></label>
      <label class="badge-check"><input type="checkbox" value="Music" /><span class="badge-dot music">M</span><span class="badge-label">Music Badge</span></label>
      <label class="badge-check"><input type="checkbox" value="Music Wristband" /><span class="badge-dot wristband">W</span><span class="badge-label">Music Wristband</span></label>
      <label class="badge-check"><input type="checkbox" value="Free" /><span class="badge-dot free">&#10003;</span><span class="badge-label">Free / Open</span></label>
    </div>
  </div>

  <div class="control-group">
    <label>Your Location</label>
    <input type="text" id="locationInput" placeholder="Address or hotel name" style="width: 220px;" />
  </div>
  <button class="btn" id="locationBtn" onclick="geocodeLocation()">Sort by Proximity</button>
</div>

<div class="main-content">
  <div class="event-list-panel" id="eventListPanel">
    <div class="results-header">
      <span id="resultCount">Loading...</span>
      <div class="view-toggle">
        <button class="active" onclick="setView('split')">Split</button>
        <button onclick="setView('list')">List</button>
        <button onclick="setView('map')">Map</button>
      </div>
    </div>
    <div id="eventList"><div class="loading">Loading events...</div></div>
  </div>
  <div class="map-panel" id="mapPanel">
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// State
let allEvents = [];
let filteredEvents = [];
let userLat = null;
let userLng = null;
let map, markerGroup;
let debounceTimer;

// Initialize map
function initMap() {
  map = L.map('map', {
    zoomControl: true,
    attributionControl: false
  }).setView([30.267, -97.743], 14);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  markerGroup = L.layerGroup().addTo(map);
}

// Fetch events
async function fetchEvents() {
  const params = new URLSearchParams();
  const day = document.querySelector('.day-btn.active')?.dataset.day;
  const genre = document.getElementById('genreSelect').value;
  const search = document.getElementById('searchInput').value;

  const checkedAccess = [...document.querySelectorAll('.badge-filters input:checked')]
    .map(c => c.value);

  if (day) params.set('day', day);
  if (genre) params.set('genre', genre);
  if (checkedAccess.length) params.set('access', checkedAccess.join(','));
  if (search) params.set('search', search);
  if (userLat != null) {
    params.set('lat', userLat);
    params.set('lng', userLng);
  }

  const resp = await fetch('/api/events?' + params.toString());
  const data = await resp.json();
  filteredEvents = data.events;
  renderEvents(filteredEvents);
  renderMap(filteredEvents);
  document.getElementById('resultCount').textContent =
    `${data.total} event${data.total !== 1 ? 's' : ''}`;
}

function renderEvents(events) {
  const container = document.getElementById('eventList');
  if (!events.length) {
    container.innerHTML = `<div class="no-results"><h3>No events found</h3><p>Try adjusting your filters</p></div>`;
    return;
  }

  container.innerHTML = events.map(e => {
    const badgeLabels = {
      'Platinum': 'P', 'Interactive': 'I', 'Film & TV': 'F',
      'Music': 'M', 'Free': 'Free'
    };
    const badgeCls = a => a === 'Film & TV' ? 'Film' : a;
    const badges = (e.access_levels || []).map(a =>
      `<span class="badge-pill ${badgeCls(a)}" title="${a === 'Film & TV' ? 'Film & TV Badge' : a === 'Free' ? 'Free / Open' : a + ' Badge'}">${badgeLabels[a] || a[0]}</span>`
    ).join('');

    const distHtml = e.distance != null && e.distance < 999
      ? `<span class="distance-badge">${e.distance} mi</span>` : '';

    const thumbHtml = e.thumbnail_url
      ? `<img class="event-thumb" src="${e.thumbnail_url}" alt="" loading="lazy" onerror="this.style.display='none'" />`
      : '';

    const inSched = isInSchedule(e.id);
    const schedBtnHtml = `<button class="sched-btn ${inSched ? 'added' : ''}" onclick="event.stopPropagation(); toggleSchedule('${e.id}')" title="${inSched ? 'Remove from schedule' : 'Add to schedule'}">${inSched ? '&check;' : '+'}</button>`;

    return `<div class="event-card" data-id="${e.id}" data-lat="${e.venue_lat}" data-lng="${e.venue_lng}" onclick="panTo(${e.venue_lat}, ${e.venue_lng})">
      ${thumbHtml}
      <div class="event-info">
        <div class="event-name">${esc(e.name)}</div>
        <div class="event-meta">
          <span class="time">${e.start_time}${e.end_time ? ' - ' + e.end_time : ''}</span>
          <span class="venue">${esc(e.venue)}</span>
          <span>${e.date}</span>
        </div>
        <div class="event-badges">
          ${badges}
          ${e.genre ? `<span class="badge-genre">${esc(e.genre)}</span>` : ''}
        </div>
      </div>
      <div class="event-actions">
        ${schedBtnHtml}
        ${distHtml}
      </div>
    </div>`;
  }).join('');
}

function renderMap(events) {
  markerGroup.clearLayers();
  const bounds = [];

  // Group events by venue for clustering
  const venueGroups = {};
  events.forEach(e => {
    if (!e.venue_lat || !e.venue_lng) return;
    const key = `${e.venue_lat},${e.venue_lng}`;
    if (!venueGroups[key]) venueGroups[key] = [];
    venueGroups[key].push(e);
  });

  Object.entries(venueGroups).forEach(([key, evts]) => {
    const [lat, lng] = key.split(',').map(Number);
    bounds.push([lat, lng]);

    const count = evts.length;
    const venue = evts[0].venue;
    const radius = Math.min(Math.max(count * 1.5 + 6, 8), 20);

    const marker = L.circleMarker([lat, lng], {
      radius: radius,
      fillColor: '#28a745',
      fillOpacity: 0.8,
      color: '#fff',
      weight: 1
    });

    const popupContent = `
      <div class="popup-name">${esc(venue)}</div>
      <div class="popup-venue">${esc(evts[0].venue_address)}</div>
      <hr style="border-color:#333;margin:6px 0;">
      ${evts.slice(0, 15).map(e => `
        <div style="margin:4px 0;">
          <span class="popup-time">${e.start_time}</span>
          <strong>${esc(e.name)}</strong>
          ${e.genre ? `<span style="color:#888;"> · ${e.genre}</span>` : ''}
        </div>
      `).join('')}
      ${count > 15 ? `<div style="color:#888;margin-top:4px;">+ ${count - 15} more</div>` : ''}
    `;
    marker.bindPopup(popupContent, { maxHeight: 300, maxWidth: 320 });
    markerGroup.addLayer(marker);
  });

  // Add user location marker
  if (userLat && userLng) {
    const userMarker = L.circleMarker([userLat, userLng], {
      radius: 10,
      fillColor: '#e55714',
      fillOpacity: 1,
      color: '#fff',
      weight: 2
    });
    userMarker.bindPopup('<strong>Your Location</strong>');
    markerGroup.addLayer(userMarker);
    bounds.push([userLat, userLng]);
  }

  if (bounds.length) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
  }
}

function panTo(lat, lng) {
  if (lat && lng && map) {
    map.setView([lat, lng], 16);
    // Open popup for the marker at this location
    markerGroup.eachLayer(layer => {
      if (layer.getLatLng &&
          Math.abs(layer.getLatLng().lat - lat) < 0.0001 &&
          Math.abs(layer.getLatLng().lng - lng) < 0.0001) {
        layer.openPopup();
      }
    });
  }
}

async function geocodeLocation() {
  const addr = document.getElementById('locationInput').value.trim();
  if (!addr) return;

  const btn = document.getElementById('locationBtn');
  btn.disabled = true;
  btn.textContent = 'Geocoding...';

  try {
    const resp = await fetch('/api/geocode?address=' + encodeURIComponent(addr));
    const data = await resp.json();
    if (data.lat) {
      userLat = data.lat;
      userLng = data.lng;
      btn.textContent = 'Update Location';
      fetchEvents();
    } else {
      alert('Address not found. Try a more specific address in Austin, TX.');
    }
  } catch (e) {
    alert('Geocoding error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function rescrape() {
  const btn = document.getElementById('rescrapeBtn');
  const status = document.getElementById('scrapeStatus');
  btn.disabled = true;
  status.textContent = 'Scraping...';
  status.classList.add('active');

  try {
    await fetch('/api/rescrape', { method: 'POST' });
    // Poll until done (check last_scraped changes)
    const originalScraped = document.getElementById('lastScraped').textContent;
    const poll = setInterval(async () => {
      const resp = await fetch('/api/events?day=2026-03-12');
      const data = await resp.json();
      if (data.last_scraped && data.last_scraped !== originalScraped) {
        clearInterval(poll);
        status.textContent = 'Done!';
        status.classList.remove('active');
        btn.disabled = false;
        document.getElementById('lastScraped').textContent =
          'Last updated: ' + data.last_scraped.slice(0, 16);
        setTimeout(() => { status.textContent = ''; }, 3000);
        fetchEvents();
      }
    }, 3000);
  } catch (e) {
    status.textContent = 'Error';
    status.classList.remove('active');
    btn.disabled = false;
  }
}

function setView(mode) {
  const listPanel = document.getElementById('eventListPanel');
  const mapPanel = document.getElementById('mapPanel');
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));

  if (mode === 'list') {
    listPanel.style.flex = '1';
    mapPanel.style.display = 'none';
    event.target.classList.add('active');
  } else if (mode === 'map') {
    listPanel.style.display = 'none';
    mapPanel.style.display = 'block';
    mapPanel.style.width = '100%';
    event.target.classList.add('active');
  } else {
    listPanel.style.display = '';
    listPanel.style.flex = '1';
    mapPanel.style.display = '';
    mapPanel.style.width = '45%';
    event.target.classList.add('active');
  }
  setTimeout(() => map.invalidateSize(), 100);
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Schedule (localStorage)
function getSchedule() {
  try { return JSON.parse(localStorage.getItem('sxsw_schedule') || '[]'); }
  catch { return []; }
}
function saveSchedule(ids) {
  localStorage.setItem('sxsw_schedule', JSON.stringify(ids));
  updateSchedCount();
}
function isInSchedule(id) { return getSchedule().includes(id); }
function toggleSchedule(id) {
  let ids = getSchedule();
  if (ids.includes(id)) {
    ids = ids.filter(i => i !== id);
  } else {
    ids.push(id);
  }
  saveSchedule(ids);
  // Update button in-place
  const card = document.querySelector(`.event-card[data-id="${id}"]`);
  if (card) {
    const btn = card.querySelector('.sched-btn');
    const inSched = ids.includes(id);
    btn.classList.toggle('added', inSched);
    btn.innerHTML = inSched ? '&check;' : '+';
    btn.title = inSched ? 'Remove from schedule' : 'Add to schedule';
  }
}
function updateSchedCount() {
  const ids = getSchedule();
  const el = document.getElementById('schedCount');
  if (el) {
    el.textContent = ids.length;
    el.style.display = ids.length > 0 ? '' : 'none';
  }
}

// Event listeners
document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fetchEvents();
  });
});

document.getElementById('genreSelect').addEventListener('change', fetchEvents);

document.querySelectorAll('.badge-filters input').forEach(cb => {
  cb.addEventListener('change', () => {
    cb.closest('.badge-check').classList.toggle('checked', cb.checked);
    fetchEvents();
  });
});

document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchEvents, 300);
});

document.getElementById('locationInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') geocodeLocation();
});

// Init
initMap();
fetchEvents();
updateSchedCount();
</script>
